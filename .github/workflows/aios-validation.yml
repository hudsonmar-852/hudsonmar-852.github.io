name: AIOS validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: aios-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test public production baseline
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run unit tests
        run: node --test aios/tests/production-consolidation.test.mjs avataros/tests/prompt-builder.test.mjs avataros/tests/validation.test.mjs functions/private-test/index.test.mjs

      - name: Validate production assets
        run: |
          node aios/scripts/validate-production-consolidation.mjs
          node avataros/scripts/validate-avataros.mjs

      - name: Check JavaScript syntax
        run: |
          node --check functions/private-test/index.js
          node --check functions/private-test/index.test.mjs
          node --check aios/scripts/validate-production-consolidation.mjs
          node --check aios/tests/production-consolidation.test.mjs
          node --check avataros/scripts/validate-avataros.mjs
          node --check avataros/scripts/build-image-prompt.mjs
          node --check avataros/tests/prompt-builder.test.mjs
          node --check avataros/tests/validation.test.mjs
