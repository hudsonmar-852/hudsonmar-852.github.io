<!DOCTYPE html><html lang='zh-HK'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Hudson Mar · GitHub Landing</title><style>:root{--bg:#f5f7fb;--text:#111827;--muted:#6b7280;--card:#fff;--soft:#f3f4f6;--border:rgba(17,24,39,.08)}body.dark{--bg:#0b1020;--text:#f9fafb;--muted:#cbd5e1;--card:#111827;--soft:#1f2937;--border:rgba(255,255,255,.1)}*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}body{background:var(--bg);color:var(--text);padding:24px;transition:.2s}.container{max-width:1160px;margin:auto}.hero{background:linear-gradient(135deg,#111827,#374151);padding:42px;border-radius:30px;color:#fff;margin-bottom:22px}.hero h1{font-size:2.5rem}.hero p{color:#d1d5db;margin-top:10px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.toggle{border:none;padding:10px 14px;border-radius:999px;background:var(--card);cursor:pointer}.search{width:100%;padding:15px;border-radius:18px;border:1px solid var(--border);background:var(--card);color:var(--text);margin:18px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px;text-decoration:none;color:var(--text);transition:.2s}.card:hover{transform:translateY(-4px)}.title{font-size:1.3rem;font-weight:900;margin:10px 0}.desc{color:var(--muted);margin-bottom:12px}.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:var(--soft);font-size:.8rem;margin-right:6px}.url{background:var(--soft);padding:8px 10px;border-radius:12px;font-size:.85rem;margin-top:12px;color:var(--muted)}footer{text-align:center;color:#9ca3af;margin-top:30px}</style></head><body><div class='container'><div class='top'><h3>Hudson Mar</h3><button class='toggle' onclick='toggleTheme()'>🌙 Dark</button></div><section class='hero'><h1>Hudson Mar · Landing Page</h1><p>集中管理所有 GitHub repos & subsite pages。</p></section><input class='search' id='search' placeholder='Search Bible, Jeffrey, Prompt, Grok...' oninput='render()'><div class='grid' id='grid'></div><footer>Hudson Mar GitHub Landing</footer></div><script>const sites=[{title:'Bible',icon:'📖',url:'https://hudsonmar-852.github.io/Jeffrey/bible.html',repo:'Jeffrey',category:'Faith',recent:true,protected:false,desc:'Bible subsite：聖經金句、祝福與解說。'},{title:'Jeffrey',icon:'🏋️',url:'https://hudsonmar-852.github.io/Jeffrey/',repo:'Jeffrey',category:'Fitness',recent:true,protected:false,desc:'Jeffrey 健身教材與每日提醒。'},{title:'Prompt',icon:'🧠',url:'https://hudsonmar-852.github.io/prompt/',repo:'prompt',category:'AI',recent:false,protected:true,desc:'Prompt library & reusable systems.'},{title:'Grok',icon:'🎬',url:'https://hudsonmar-852.github.io/Grok/',repo:'Grok',category:'Video',recent:false,protected:true,desc:'Grok Imagine prompts & clips.'}];function render(){const q=document.getElementById('search').value.toLowerCase();document.getElementById('grid').innerHTML=sites.filter(s=>JSON.stringify(s).toLowerCase().includes(q)).map(s=>`<a class='card' href='${s.url}' target='_blank'><div style='font-size:2rem'>${s.icon}</div><div class='title'>${s.title}</div><div class='desc'>${s.desc}</div><div><span class='badge'>${s.category}</span>${s.recent?'<span class="badge">Recent</span>':''}${s.protected?'<span class="badge">Protected</span>':''}</div><div class='url'>${s.url}</div></a>`).join('')}function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('hmTheme',document.body.classList.contains('dark')?'dark':'light')}if(localStorage.getItem('hmTheme')==='dark'){document.body.classList.add('dark')}render();</script></body></html>
