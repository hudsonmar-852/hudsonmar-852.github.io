<!DOCTYPE html>

    @media(max-width:620px){.bar{height:auto;min-height:58px;padding:10px 12px;align-items:flex-start}.brand{padding-top:7px}.links{justify-content:flex-end}iframe{height:calc(100vh - 78px)}}

</head>

    <nav class="links">
